        // Componente de icono dinámico para evitar fallos de renderizado
        function Icon({ name, size = 20, className = "" }) {
            const spanRef = useRef(null);

            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconElement.setAttribute('style', `width: ${size}px; height: ${size}px; display: inline-block;`);
                    iconElement.className = className;
                    spanRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: {
                            class: className
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
        }
